{{- if .Values.secrets.create }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace (include "oad.secretName" .)) | default dict -}}
{{- $data := (get $existing "data") | default dict -}}
{{- $bearerToken := .Values.secrets.bearerToken -}}
{{- if not $bearerToken }}{{- $bearerToken = ((get $data "OAD_BEARER_TOKEN" | default "") | b64dec) -}}{{- end -}}
{{- if not $bearerToken }}{{- $bearerToken = randAlphaNum 48 -}}{{- end -}}
{{- $registerToken := .Values.secrets.registerToken -}}
{{- if not $registerToken }}{{- $registerToken = ((get $data "OAD_CONTROL_PLANE_TOKEN" | default "") | b64dec) -}}{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oad.secretName" . }}
  labels:
    {{- include "oad.labels" . | nindent 4 }}
type: Opaque
data:
  OAD_BEARER_TOKEN: {{ $bearerToken | b64enc | quote }}
  {{- if $registerToken }}
  OAD_CONTROL_PLANE_TOKEN: {{ $registerToken | b64enc | quote }}
  {{- end }}
{{- end }}
