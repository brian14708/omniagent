{{- if .Values.secrets.create }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace (include "omniagent.secretName" .)) | default dict -}}
{{- $data := (get $existing "data") | default dict -}}
{{- $databaseUrl := .Values.secrets.databaseUrl -}}
{{- if not $databaseUrl }}{{- $databaseUrl = ((get $data "DATABASE_URL" | default "") | b64dec) -}}{{- end -}}
{{- $secretKeyBase := .Values.secrets.secretKeyBase -}}
{{- if not $secretKeyBase }}{{- $secretKeyBase = ((get $data "SECRET_KEY_BASE" | default "") | b64dec) -}}{{- end -}}
{{- if not $secretKeyBase }}{{- $secretKeyBase = randAlphaNum 64 -}}{{- end -}}
{{- $releaseCookie := .Values.secrets.releaseCookie -}}
{{- if not $releaseCookie }}{{- $releaseCookie = ((get $data "RELEASE_COOKIE" | default "") | b64dec) -}}{{- end -}}
{{- if not $releaseCookie }}{{- $releaseCookie = randAlphaNum 64 -}}{{- end -}}
{{- $rustfsAccessKey := .Values.secrets.rustfsAccessKeyId -}}
{{- if not $rustfsAccessKey }}{{- $rustfsAccessKey = ((get $data "RUSTFS_ACCESS_KEY_ID" | default "") | b64dec) -}}{{- end -}}
{{- $rustfsSecretKey := .Values.secrets.rustfsSecretAccessKey -}}
{{- if not $rustfsSecretKey }}{{- $rustfsSecretKey = ((get $data "RUSTFS_SECRET_ACCESS_KEY" | default "") | b64dec) -}}{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omniagent.secretName" . }}
  labels:
    {{- include "omniagent.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $databaseUrl }}
  DATABASE_URL: {{ $databaseUrl | b64enc | quote }}
  {{- end }}
  SECRET_KEY_BASE: {{ $secretKeyBase | b64enc | quote }}
  RELEASE_COOKIE: {{ $releaseCookie | b64enc | quote }}
  {{- if $rustfsAccessKey }}
  RUSTFS_ACCESS_KEY_ID: {{ $rustfsAccessKey | b64enc | quote }}
  {{- end }}
  {{- if $rustfsSecretKey }}
  RUSTFS_SECRET_ACCESS_KEY: {{ $rustfsSecretKey | b64enc | quote }}
  {{- end }}
{{- end }}
