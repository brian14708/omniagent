name: Nightly release

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: nightly-release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: nightly

jobs:
  build-cli:
    name: Build CLI (${{ matrix.bundle }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - bundle: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - bundle: darwin-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --target "${{ matrix.target }}"

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Build omniagent CLI
        run: cargo +stable build -p omniagent-cli --release --locked --target "${{ matrix.target }}"

      - name: Package CLI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          tar -C "target/${{ matrix.target }}/release" -czf "release/omniagent-cli-nightly-${{ matrix.bundle }}.tar.gz" omniagent

      - name: Upload release asset
        uses: actions/upload-artifact@v5
        with:
          name: omniagent-cli-${{ matrix.bundle }}
          path: release/*.tar.gz
          if-no-files-found: error

  publish-cli-release:
    name: Publish CLI release
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: omniagent-cli-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums and notes
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum ./*.tar.gz > SHA256SUMS
          {
            echo "Nightly omniagent CLI build from ${GITHUB_SHA}."
            echo
            echo "Assets:"
            for asset in ./*.tar.gz; do
              echo "- ${asset#./}"
            done
          } > ../release-notes.md

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --prerelease \
              --latest=false
            gh release upload "${RELEASE_TAG}" release-assets/* --clobber
          else
            gh release create "${RELEASE_TAG}" release-assets/* \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --prerelease \
              --latest=false
          fi

  publish-control-plane-image:
    name: Publish control-plane image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/control-plane" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=nightly
          labels: |
            org.opencontainers.image.title=OmniAgent control plane

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile.control-plane
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
